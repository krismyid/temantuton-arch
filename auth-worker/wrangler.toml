name = "auth-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "<YOUR_KV_NAMESPACE_ID>"

[[d1_databases]]
binding = "AUTH_DB"
database_name = "AUTH_DB"
database_id = "<YOUR_D1_DATABASE_ID>"

[vars]
FRONTEND_URL = "http://localhost:3000"
AZURE_TENANT_ID = "<YOUR_TENANT_ID>"
